<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <style>
        html {
            touch-action: pan-y;
            overscroll-behavior: none;
        }
        body {
            overscroll-behavior: none;
        }
        input, select, textarea { font-size: 16px; }

        /* Premium elastic scroll */
        .page {
            will-change: transform;
            transform: translateY(0px);
        }
        .page-wrap {
            will-change: transform;
            transform: translateY(0px) scale(1);
        }
    </style>
    <script>
        // Mobil: pinch (iki parmakla) zoom engelle
        document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
        document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
        document.addEventListener('gestureend', function (e) { e.preventDefault(); });

        // Mobil: çift dokunma zoom engelle
        document.addEventListener('dblclick', function (e) { e.preventDefault(); }, { passive: false });
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) { e.preventDefault(); }
            lastTouchEnd = now;
        }, { passive: false });

        // Masaüstü: Ctrl + tekerlek / trackpad pinch zoom engelle
        document.addEventListener('wheel', function (e) {
            if (e.ctrlKey || e.metaKey) { e.preventDefault(); }
        }, { passive: false });

        // Masaüstü: Ctrl/Cmd + '+' '-' '0' '=' klavye zoom kısayollarını engelle
        document.addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && ['+', '-', '=', '0', '_'].includes(e.key)) {
                e.preventDefault();
            }
        }, { passive: false });

        // Çoklu parmakla dokunmayı (pinch) tamamen engelle
        document.addEventListener('touchmove', function (e) {
            if (e.touches.length > 1) { e.preventDefault(); }
        }, { passive: false });

        // Input/select/textarea dışına tıklanınca klavyeyi kapat
        document.addEventListener('click', function (e) {
            const tag = e.target.tagName;
            const isFormField = tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA';
            if (!isFormField && document.activeElement && typeof document.activeElement.blur === 'function') {
                document.activeElement.blur();
            }
        }, true);
    </script>
    <title>Musa Arıcan - Berber</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #090909;
            color: #FFFFFF;
        }
        
        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* PAGE CONTAINER */
        .page {
            display: none;
            flex: 1;
            width: 100%;
            min-height: 0;
            animation: fadeIn 0.4s ease;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .page.active {
            display: flex;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* ===== HOME PAGE ===== */
        .home-page {
            position: relative;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: clamp(0.6rem, 1.2vh, 1rem) clamp(0.8rem, 2vw, 1.5rem);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .page-wrap {
            position: fixed;
            inset: 0;
            background: #090909;
            z-index: -1;
        }
        
        /* Logo section - top */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(4px, 0.8vw, 8px);
            width: 100%;
            max-width: 520px;
            flex-shrink: 0;
        }
        
        .logo-glow-area {
            position: relative;
            width: clamp(130px, 36vw, 210px);
            height: clamp(130px, 36vw, 210px);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        
        .logo-img {
            position: relative;
            width: 85%;
            height: auto;
            max-width: 185px;
            display: block;
            filter: saturate(0) brightness(1.35) contrast(1.1);
        }
        
        .brand-lockup {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(2px, 0.4vw, 4px);
        }
        
        .brand-name {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 700;
            font-size: clamp(30px, 5.7vw, 56px);
            color: #FFFFFF;
            letter-spacing: 1.5px;
            line-height: 1;
            text-align: center;
            white-space: nowrap;
        }
        
        .brand-subtitle {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 500;
            font-size: clamp(10px, 1.8vw, 15px);
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #FFFFFF;
            text-align: center;
            white-space: nowrap;
        }
        
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 0.8vw, 8px);
            margin-top: clamp(2px, 0.4vh, 4px);
        }
        
        .divider .line {
            width: clamp(20px, 5vw, 40px);
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.6));
        }
        
        .divider .line.right {
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.6), transparent);
        }
        
        .divider .diamond {
            width: 4px;
            height: 4px;
            background: #D4AF37;
            transform: rotate(45deg);
        }
        
        /* Middle section - CTA */
        .middle-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(10px, 1.5vh, 16px);
            text-align: center;
            width: 100%;
            max-width: 520px;
            flex: 1;
            justify-content: center;
        }
        
        .tagline-sub {
            font-family: 'Manrope', sans-serif;
            font-weight: 400;
            font-size: clamp(12.75px, 1.9vw, 15.75px);
            color: #C4C4C4;
        }
        
        .gold-btn {
            width: min(61.9vw, 270px);
            height: clamp(43px, 10.1vw, 54px);
            background: linear-gradient(180deg, #FCE9A0 0%, #F8DE73 22%, #E9C25E 48%, #C79824 78%, #A87C18 100%);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.65), inset 0 -5px 8px rgba(90, 60, 8, 0.5);
            border: none;
            border-radius: clamp(12.4px, 3.4vw, 16.9px);
            color: #17130a;
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: clamp(13.5px, 3.4vw, 15.8px);
            letter-spacing: 0.3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(0.225rem, 1.1vw, 0.4rem);
            padding: 0 clamp(0.675rem, 2.8vw, 1rem);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 2;
        }
        
        .gold-btn:hover {
            filter: brightness(1.08);
            box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.75), inset 0 -7px 11px rgba(90, 60, 8, 0.5);
        }
        
        .gold-btn:active {
            transform: scale(0.98);
        }
        
        .gold-btn svg {
            width: clamp(18px, 3.15vw, 20.3px);
            height: clamp(18px, 3.15vw, 20.3px);
        }
        
        /* Location section - bottom */
        .location-section {
            width: 100%;
            max-width: min(95vw, 420px);
            flex-shrink: 0;
            margin-bottom: clamp(14px, 3vh, 28px);
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(30, 28, 25, 0.7) 0%, rgba(20, 18, 16, 0.7) 100%);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: clamp(12px, 3vw, 17px);
            padding: clamp(0.75rem, 3.2vw, 1.1rem);
            gap: clamp(0.6rem, 2.6vw, 0.9rem);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .location-icon {
            width: clamp(32px, 8.5vw, 40px);
            height: clamp(32px, 8.5vw, 40px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .location-icon svg {
            width: clamp(16px, 4vw, 20px);
            height: clamp(16px, 4vw, 20px);
        }
        
        .location-title {
            font-weight: 600;
            font-size: clamp(13px, 2.3vw, 16px);
            color: #D4AF37;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        
        .location-detail {
            font-size: clamp(14px, 2.6vw, 18px);
            color: #FFFFFF;
            text-overflow: ellipsis;
            overflow: hidden;
        }
        
        .location-detail-arrow {
            width: clamp(11px, 3vw, 14px);
            height: clamp(11px, 3vw, 14px);
            flex-shrink: 0;
        }
        
        /* ===== APPOINTMENT PAGE ===== */
        .appointment-page {
            flex-direction: column;
        }
        
        .appointment-header {
            padding: clamp(1rem, 2.5vh, 1.5rem) 0;
            text-align: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            position: relative;
            z-index: 10;
        }
        
        .appointment-header h1 {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 700;
            font-size: clamp(28px, 5.5vw, 44px);
            color: #FFFFFF;
            letter-spacing: 1.5px;
        }
        
        .appointment-header p {
            font-size: clamp(13px, 2.2vw, 15px);
            color: #B8B8B8;
            margin-top: 6px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .appointment-container {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: clamp(1.5rem, 4vh, 2.5rem) clamp(1rem, 2.5vh, 2rem) clamp(3rem, 9vh, 5rem);
        }
        
        .form-wrapper {
            width: 100%;
            max-width: 520px;
        }
        
        .form-card {
            position: relative;
            background: linear-gradient(135deg, rgba(20, 18, 16, 0.8) 0%, rgba(30, 28, 25, 0.8) 100%);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: clamp(14px, 3.5vw, 20px);
            padding: clamp(1rem, 3.5vw, 1.5rem);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            margin-bottom: clamp(1rem, 2vh, 1.5rem);
            overflow: hidden;
        }
        
        .form-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: rgba(212, 175, 55, 0.02);
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }
        
        .form-card-content {
            position: relative;
            z-index: 1;
        }
        
        .form-card-title {
            font-size: clamp(16px, 2.9vw, 19px);
            font-weight: 600;
            color: #D4AF37;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-card-icon {
            width: 24px;
            height: 24px;
            opacity: 0.5;
            flex-shrink: 0;
        }
        
        .form-group {
            margin-bottom: clamp(0.8rem, 1.5vh, 1.1rem);
        }
        
        .form-group:last-child {
            margin-bottom: 0;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: clamp(13px, 2.3vw, 15px);
            color: #D4AF37;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        
        .required::after {
            content: " *";
            color: #F56565;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: clamp(0.65rem, 2.2vw, 0.85rem);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 7px;
            background: rgba(15, 13, 11, 0.6);
            color: #FFFFFF;
            font-family: 'Manrope', sans-serif;
            font-size: clamp(16px, 2.6vw, 17px);
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: rgba(212, 175, 55, 0.6);
            background: rgba(20, 18, 16, 0.8);
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.15);
        }
        
        .form-group input::placeholder {
            color: rgba(200, 200, 200, 0.4);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }
        
        /* Calendar styles - horizontal sliding panels within the same card */
        .calendar-wrapper {
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        
        .calendar-track {
            display: flex;
            width: 200%;
            transition: transform 0.4s ease;
        }
        
        .calendar-track.show-time {
            transform: translateX(-50%);
        }
        
        .calendar-panel {
            width: 50%;
            flex-shrink: 0;
            box-sizing: border-box;
        }
        
        .calendar-panel:first-child {
            padding-right: clamp(0.4rem, 1.5vw, 0.6rem);
        }
        
        .calendar-panel:last-child {
            padding-left: clamp(0.4rem, 1.5vw, 0.6rem);
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 3px;
            gap: 8px;
        }
        
        .calendar-header h3 {
            font-size: 13px;
            font-weight: 600;
            color: #D4AF37;
        }
        
        .back-to-date-btn {
            background: none;
            border: none;
            color: #D4AF37;
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            padding: 2px 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 5px;
        }
        
        .calendar-weekday {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: #999;
            padding: 2px 0;
            text-transform: uppercase;
        }
        
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            min-height: 36px;
        }
        
        .calendar-day.past {
            background: rgba(100, 100, 100, 0.2);
            color: #666;
            cursor: not-allowed;
        }
        
        .calendar-day.available {
            background: rgba(212, 175, 55, 0.1);
            color: #D4AF37;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .calendar-day.available:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: rgba(212, 175, 55, 0.6);
        }
        
        .calendar-day.selected {
            background: linear-gradient(180deg, #FCE9A0 0%, #F8DE73 22%, #E9C25E 48%, #C79824 78%, #A87C18 100%);
            color: #17130a;
            font-weight: 600;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }
        
        /* Time slots */
        .time-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 7px;
        }
        
        .time-slot {
            padding: 10px 6px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 6px;
            background: rgba(15, 13, 11, 0.6);
            color: #D4AF37;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .time-slot:hover:not(.booked):not(.selected) {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.4);
        }
        
        .time-slot.booked {
            background: rgba(100, 100, 100, 0.2);
            color: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .time-slot.selected {
            background: linear-gradient(180deg, #FCE9A0 0%, #F8DE73 22%, #E9C25E 48%, #C79824 78%, #A87C18 100%);
            color: #17130a;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }
        
        @media (max-width: 380px) {
            .time-slots {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* Buttons */
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: clamp(0.8rem, 1.5vh, 1.2rem);
        }
        
        .submit-btn,
        .cancel-btn {
            flex: 1;
            padding: clamp(0.7rem, 1.8vh, 0.9rem);
            border: none;
            border-radius: clamp(9px, 2.3vw, 12px);
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            font-size: clamp(14px, 2.8vw, 16px);
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .submit-btn {
            background: linear-gradient(180deg, #FCE9A0 0%, #F8DE73 22%, #E9C25E 48%, #C79824 78%, #A87C18 100%);
            color: #17130a;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.65), inset 0 -5px 8px rgba(90, 60, 8, 0.5);
        }
        
        .submit-btn:hover:not(:disabled) {
            filter: brightness(1.08);
            box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.75), inset 0 -7px 11px rgba(90, 60, 8, 0.5);
        }
        
        .submit-btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .cancel-btn {
            background: rgba(212, 175, 55, 0.1);
            color: #D4AF37;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .cancel-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: rgba(212, 175, 55, 0.6);
        }
        
        /* Utility classes */
        .flex {
            display: flex;
        }
        
        .flex-1 {
            flex: 1;
        }
        
        .items-center {
            align-items: center;
        }
        
        .justify-center {
            justify-content: center;
        }
        
        .w-full {
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- HOME PAGE -->
    <div class="page home-page active" id="homePage">
        <div class="page-wrap"></div>
        
        <!-- Top section: Logo, Name, Divider -->

                                            <h3>SAAT SEÇİNİZ</h3>
                                        </div>
                                        <div class="time-slots" id="timeSlots"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- CARD 3: Service & Notes -->
                    <div class="form-card">
                        <div class="form-card-content">
                            <div class="form-card-title">
                                <svg class="form-card-icon" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                                Hizmet & Notlar
                            </div>
                            <div class="form-group">
                                <label class="required">Hizmet Tipi</label>
                                <select id="service" required>
                                    <option value="">Seçiniz</option>
                                    <option value="saç-kesimi">Saç Kesimi</option>
                                    <option value="traş">Traş</option>
                                    <option value="saç-traş">Saç + Traş</option>
                                    <option value="sakal-bakımı">Sakal Bakımı</option>
                                    <option value="tıraş-ve-sakal">Tıraş ve Sakal Bakımı</option>
                                    <option value="diğer">Diğer</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Notlar (Opsiyonel)</label>
                                <textarea id="notes" placeholder="Eklemek istediğiniz notlar..."></textarea>
                            </div>
                        </div>
                    </div>
                    
                    <!-- BUTTONS -->
                    <div class="button-group">
                        <button type="submit" class="submit-btn" id="submitBtn">Randevuyu Oluştur</button>
                        <button type="button" class="cancel-btn" onclick="showPage('homePage')">İptal</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        // PAGE NAVIGATION
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        
        // CALENDAR GENERATION
        let selectedDate = null;
        let selectedTime = null;
        
        function generateCalendar() {
            const today = new Date();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();
            const wrapper = document.getElementById('calendarWrapper');
            
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();
            
            let html = `
                <div class="calendar-header">
                    <h3>${firstDay.toLocaleString('tr-TR', { month: 'short', year: 'numeric' }).toUpperCase()}</h3>
                </div>
                <div class="calendar-weekdays">
                    <div class="calendar-weekday">Pz</div>
                    <div class="calendar-weekday">Sa</div>
                    <div class="calendar-weekday">Ça</div>
                    <div class="calendar-weekday">Pe</div>
                    <div class="calendar-weekday">Cu</div>
                    <div class="calendar-weekday">Ct</div>
                    <div class="calendar-weekday">Pz</div>
                </div>
                <div class="calendar-days">
            `;
            
            for (let i = 0; i < startingDayOfWeek; i++) {
                html += '<div></div>';
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(currentYear, currentMonth, day);
                const isPast = date < today && date.getDate() !== today.getDate();
                const dateStr = date.toISOString().split('T')[0];
                const isSelected = selectedDate === dateStr;
                
                let classList = 'calendar-day';
                if (isPast) classList += ' past';
                else classList += ' available';
                if (isSelected) classList += ' selected';
                
                html += `<div class="${classList}" onclick="selectDate('${dateStr}')" ${isPast ? 'style="cursor: not-allowed;"' : ''}>${day}</div>`;
            }
            
            html += '</div>';
            wrapper.innerHTML = html;
        }
        
        function selectDate(dateStr) {
            selectedDate = dateStr;
            selectedTime = null;
            generateCalendar();
            generateTimeSlots();
            document.getElementById('calendarTrack').classList.add('show-time');
        }
        
        function goBackToDate() {
            document.getElementById('calendarTrack').classList.remove('show-time');
        }
        
        function generateTimeSlots() {
            const container = document.getElementById('timeSlots');
            const hours = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00'];
            const bookedTimes = ['12:00', '14:00'];
            
            container.innerHTML = hours.map(time => {
                const isBooked = bookedTimes.includes(time);
                const isSelected = selectedTime === time;
                let classList = 'time-slot';
                if (isBooked) classList += ' booked';
                if (isSelected) classList += ' selected';
                
                return `<div class="${classList}" ${isBooked ? '' : `onclick="selectTime('${time}')"` }>${time}</div>`;
            }).join('');
        }
        
        function selectTime(time) {
            selectedTime = time;
            generateTimeSlots();
        }
        
        // FORM SUBMISSION
        document.getElementById('appointmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!selectedDate || !selectedTime) {
                alert('Lütfen tarih ve saat seçiniz.');
                return;
            }
            
            const formData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                date: selectedDate,
                time: selectedTime,
                service: document.getElementById('service').value,
                notes: document.getElementById('notes').value
            };
            
            localStorage.setItem('lastAppointment', JSON.stringify(formData));
            alert('✅ Randevunuz başarıyla oluşturuldu!');
            showPage('homePage');
        });
        
        // INITIALIZE
        window.addEventListener('load', generateCalendar);

        // ===== PREMIUM ELASTIC SCROLL =====
        (function () {
            function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }

            // iOS-style rubber band: diminishing resistance as pull grows,
            // asymptotically approaching maxPull.
            function rubberBand(delta, max) {
                const sign = delta < 0 ? -1 : 1;
                const abs = Math.abs(delta);
                return sign * max * (1 - Math.exp(-abs / (max * 1.6)));
            }

            function maxPull() {
                // Max ~2.5% of viewport height, capped for very tall screens
                return Math.min(window.innerHeight * 0.025, 65);
            }

            function setupElastic(page) {
                const bg = page.querySelector('.page-wrap');
                let startY = 0;
                let pulling = false;
                let pullDistance = 0; // signed: positive = pulled at top, negative = pulled at bottom
                let wheelTimer = null;

                function atTop() { return page.scrollTop <= 0; }
                function atBottom() { return page.scrollTop + page.clientHeight >= page.scrollHeight - 1; }

                function render(px) {
                    page.style.transform = `translateY(${px}px)`;
                    if (bg) {
                        // background lags behind with reduced amplitude for parallax depth
                        const bgPx = px * 0.35;
                        const scale = 1 + Math.abs(px) * 0.0006;
                        bg.style.transform = `translateY(${bgPx}px) scale(${scale})`;
                    }
                }

                function clearTransitions() {
                    page.style.transition = '';
                    if (bg) bg.style.transition = '';
                }

                function springBack() {
                    page.style.transition = 'transform 0.55s cubic-bezier(0.22, 1.4, 0.36, 1)';
                    if (bg) bg.style.transition = 'transform 0.55s cubic-bezier(0.22, 1.4, 0.36, 1)';
                    render(0);
                    pullDistance = 0;
                    const done = () => {
                        clearTransitions();
                        page.removeEventListener('transitionend', done);
                    };
                    page.addEventListener('transitionend', done);
                }

                // ---- Touch (mobile & tablet) ----
                page.addEventListener('touchstart', (e) => {
                    if (e.touches.length !== 1) return;
                    startY = e.touches[0].clientY;
                    pulling = false;
                    pullDistance = 0;
                    clearTransitions();
                }, { passive: true });

                page.addEventListener('touchmove', (e) => {
                    if (e.touches.length !== 1) return;
                    const currentY = e.touches[0].clientY;
                    const deltaY = currentY - startY;

                    const pullingAtTop = atTop() && deltaY > 0;
                    const pullingAtBottom = atBottom() && deltaY < 0;

                    if (pullingAtTop || pullingAtBottom) {
                        pulling = true;
                        e.preventDefault();
                        pullDistance = deltaY;
                        render(rubberBand(pullDistance, maxPull()));
                    } else if (pulling) {
                        // finger reversed direction back past the edge; ease back
                        pulling = false;
                        springBack();
                    }
                }, { passive: false });

                page.addEventListener('touchend', () => {
                    if (pulling) { pulling = false; springBack(); }
                });
                page.addEventListener('touchcancel', () => {
                    if (pulling) { pulling = false; springBack(); }
                });

                // ---- Wheel / trackpad (desktop) ----
                page.addEventListener('wheel', (e) => {
                    const scrollingUp = e.deltaY < 0;
                    const scrollingDown = e.deltaY > 0;
                    const pullingAtTop = atTop() && scrollingUp;
                    const pullingAtBottom = atBottom() && scrollingDown;

                    if (pullingAtTop || pullingAtBottom) {
                        e.preventDefault();
                        clearTransitions();
                        // Trackpads send many small deltas; accumulate for a smooth feel
                        pullDistance = clamp(pullDistance - e.deltaY, -maxPull() * 3, maxPull() * 3);
                        render(rubberBand(pullDistance, maxPull()));

                        clearTimeout(wheelTimer);
                        wheelTimer = setTimeout(springBack, 130);
                    }
                }, { passive: false });
            }

            document.querySelectorAll('.page').forEach(setupElastic);
        })();
    </script>
</body>
</html>
